<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Logo ¿Me alcanza?</title>
  <desc id="desc">Logo circular con fondo blanco interior y exterior transparente, casa, calculadora, moneda, gráficos y el texto Finanzas simples para Chile.</desc>

  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2aa7b7"/>
      <stop offset="100%" stop-color="#0d7891"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="512" cy="512" r="470"/>
    </clipPath>
  </defs>

  <!-- Fondo exterior transparente; interior blanco -->
  <circle cx="512" cy="512" r="470" fill="#ffffff"/>
  <circle cx="512" cy="512" r="470" fill="none" stroke="#0d4354" stroke-width="18"/>

  <!-- Onda inferior -->
  <g clip-path="url(#circleClip)">
    <path d="M40 760
             C190 700, 320 805, 475 770
             C640 733, 758 825, 980 752
             L980 1000 L40 1000 Z"
          fill="#e4f1f5"/>
  </g>

  <!-- Casa -->
  <g fill="none" stroke="#0d4354" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M290 245 L500 95 L710 245"/>
    <path d="M330 220 V335"/>
    <path d="M666 218 V335"/>
    <path d="M500 95 L635 195"/>
    <path d="M610 112 V176"/>
  </g>
  <g fill="url(#tealGrad)">
    <rect x="450" y="215" width="45" height="45" rx="5"/>
    <rect x="505" y="215" width="45" height="45" rx="5"/>
    <rect x="450" y="270" width="45" height="45" rx="5"/>
    <rect x="505" y="270" width="45" height="45" rx="5"/>
  </g>

  <!-- Calculadora -->
  <g>
    <rect x="610" y="245" width="175" height="265" rx="24" fill="#0d4354"/>
    <rect x="634" y="272" width="127" height="54" rx="10" fill="url(#tealGrad)"/>
    <g fill="#ffffff">
      <rect x="635" y="352" width="38" height="38" rx="7"/>
      <rect x="682" y="352" width="38" height="38" rx="7"/>
      <rect x="729" y="352" width="38" height="38" rx="7"/>
      <rect x="635" y="400" width="38" height="38" rx="7"/>
      <rect x="682" y="400" width="38" height="38" rx="7"/>
      <rect x="729" y="400" width="38" height="38" rx="7"/>
      <rect x="635" y="448" width="38" height="38" rx="7"/>
      <rect x="682" y="448" width="38" height="38" rx="7"/>
      <rect x="729" y="448" width="38" height="38" rx="7"/>
    </g>
    <circle cx="785" cy="440" r="62" fill="url(#tealGrad)" stroke="#ffffff" stroke-width="8"/>
    <text x="785" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700" fill="#ffffff">$</text>
  </g>

  <!-- Marca -->
  <text x="245" y="485" font-family="Arial, Helvetica, sans-serif" font-size="138" font-weight="700" fill="#0d4354">¿Me</text>
  <text x="195" y="625" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="700" fill="url(#tealGrad)">alcanza</text>
  <text x="820" y="625" font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="700" fill="#0d4354">?</text>

  <!-- Lema -->
  <text x="512" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="500" fill="#0d4354">Finanzas simples para Chile</text>

  <!-- Gráfica inferior -->
  <g transform="translate(370 760)">
    <rect x="0" y="90" width="34" height="48" rx="4" fill="#35b5b0"/>
    <rect x="48" y="60" width="34" height="78" rx="4" fill="#1e9ca8"/>
    <rect x="96" y="18" width="34" height="120" rx="4" fill="#0d7891"/>
    <path d="M0 70 C38 65 60 44 90 20 C108 6 121 -4 138 -22"
          fill="none" stroke="#0d4354" stroke-width="12" stroke-linecap="round"/>
    <path d="M122 -26 L142 -26 L142 -6" fill="none" stroke="#0d4354" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Gráfico circular -->
  <g transform="translate(575 830)">
    <circle cx="0" cy="0" r="76" fill="#1e9ca8"/>
    <path d="M0 0 L0 -76 A76 76 0 0 1 66 -37 Z" fill="#0d4354"/>
    <path d="M0 0 L66 -37 A76 76 0 0 1 68 34 Z" fill="#6fd2d4"/>
    <path d="M0 0 L68 34 A76 76 0 0 1 0 76 Z" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Dominio -->
  <circle cx="300" cy="928" r="7" fill="#0d4354"/>
  <circle cx="724" cy="928" r="7" fill="#0d4354"/>
  <text x="512" y="945" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" letter-spacing="6" fill="#1e9ca8">MEALCANZA.CL</text>
</svg>
